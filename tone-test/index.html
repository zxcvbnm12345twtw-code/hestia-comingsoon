<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#08080b">
<title>HESTIA｜色調聖所 V4</title>

<style>
:root{
  --fg:#f4efe9;
  --muted:rgba(244,239,233,.58);
  --faint:rgba(244,239,233,.28);
  --line:rgba(255,255,255,.14);
  --base:#18090d;
  --glow-a:rgba(171,72,78,.35);
  --glow-b:rgba(103,26,35,.25);
  --mid-x:0px;
  --mid-y:0px;
  --near-x:0px;
  --near-y:0px;
  --desktop-x:0px;
  --desktop-y:0px;
  --safe-top:max(18px,env(safe-area-inset-top));
  --safe-bottom:max(18px,env(safe-area-inset-bottom));
  --ease:cubic-bezier(.22,.72,.24,1);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
  background:#08080b;
  color:var(--fg);
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    "Noto Sans TC",
    "PingFang TC",
    "Microsoft JhengHei",
    sans-serif;
}

body{
  overscroll-behavior:none;
}

button{
  font:inherit;
}

button,
[role="button"]{
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
}

.app{
  position:relative;
  width:100%;
  height:100dvh;
  min-height:100vh;
  overflow:hidden;
  isolation:isolate;
  background:#08080b;
}

/* ---------- 環境層：遠、中、近三層分速 ---------- */

.environment{
  position:absolute;
  inset:0;
  z-index:0;
  overflow:hidden;
  background:
    radial-gradient(86vmax 68vmax at 72% 35%,var(--glow-a),transparent 64%),
    radial-gradient(76vmax 62vmax at 20% 76%,var(--glow-b),transparent 66%),
    linear-gradient(148deg,var(--base),#09090c 61%,#020203);
  transition:background .16s linear;
}

.layer{
  position:absolute;
  inset:-12%;
  pointer-events:none;
  will-change:transform,opacity;
}

.layer-far{
  background:
    radial-gradient(52vmax 46vmax at 74% 28%,var(--glow-a),transparent 68%),
    radial-gradient(46vmax 42vmax at 22% 78%,var(--glow-b),transparent 70%);
  filter:blur(50px);
  opacity:.44;
  transform:translate3d(
    calc(var(--desktop-x) * .24),
    calc(var(--desktop-y) * .24),
    0
  ) scale(1.08);
  animation:farBreath 18s ease-in-out infinite alternate;
}

.layer-mid{
  background:
    conic-gradient(
      from 218deg at 58% 46%,
      transparent 0 18%,
      rgba(255,255,255,.035) 25%,
      transparent 35% 61%,
      rgba(255,255,255,.022) 69%,
      transparent 80%
    );
  filter:blur(32px);
  opacity:.62;
  mix-blend-mode:soft-light;
  transform:
    translate3d(
      calc(var(--mid-x) + var(--desktop-x) * .5),
      calc(var(--mid-y) + var(--desktop-y) * .5),
      0
    )
    rotate(.001deg)
    scale(1.1);
}

.layer-near{
  background:
    radial-gradient(34vmax 20vmax at 50% 57%,rgba(255,255,255,.045),transparent 72%),
    linear-gradient(105deg,transparent 26%,rgba(255,255,255,.024) 47%,transparent 66%);
  filter:blur(18px);
  opacity:.42;
  mix-blend-mode:screen;
  transform:
    translate3d(
      calc(var(--near-x) + var(--desktop-x)),
      calc(var(--near-y) + var(--desktop-y)),
      0
    )
    scale(1.04);
}

@keyframes farBreath{
  to{
    opacity:.58;
    transform:
      translate3d(
        calc(var(--desktop-x) * .24 - 2vw),
        calc(var(--desktop-y) * .24 + 2vh),
        0
      )
      scale(1.14);
  }
}

.grain{
  position:absolute;
  inset:-50%;
  z-index:80;
  pointer-events:none;
  opacity:.075;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.5'/%3E%3C/svg%3E");
  animation:grain .22s steps(2) infinite;
  mix-blend-mode:soft-light;
}

@keyframes grain{
  0%{transform:translate(0)}
  25%{transform:translate(2%,-1%)}
  50%{transform:translate(-1%,2%)}
  75%{transform:translate(1%,1%)}
  100%{transform:translate(-2%,-1%)}
}

/* ---------- 共用品牌列 ---------- */

.site-header{
  position:absolute;
  z-index:70;
  top:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:var(--safe-top) 22px 0;
  pointer-events:none;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:11px;
  font-weight:650;
  letter-spacing:.17em;
}

.brand-mark{
  width:19px;
  height:25px;
  filter:drop-shadow(0 0 18px var(--glow-a));
}

.section-name{
  color:var(--muted);
  font-size:10px;
  letter-spacing:.22em;
}

/* ---------- 首屏喚醒 ---------- */

.intro{
  position:absolute;
  inset:0;
  z-index:50;
  display:grid;
  place-items:center;
  padding:94px 24px 90px;
  text-align:center;
  transition:
    opacity 1s var(--ease),
    visibility 1s,
    transform 1s var(--ease);
}

.intro.is-hidden{
  opacity:0;
  visibility:hidden;
  transform:scale(1.035);
}

.intro-inner{
  width:min(100%,660px);
}

.intro-kicker{
  margin-bottom:25px;
  color:var(--muted);
  font-size:11px;
  letter-spacing:.16em;
}

.intro h1{
  margin:0;
  font-size:clamp(44px,11vw,94px);
  font-weight:390;
  line-height:.94;
  letter-spacing:.01em;
}

.intro-copy{
  margin:24px auto 0;
  max-width:440px;
  color:var(--muted);
  font-size:14px;
  line-height:1.9;
}

.awaken-shell{
  position:relative;
  width:154px;
  height:154px;
  margin:36px auto 0;
  display:grid;
  place-items:center;
}

.awaken-button{
  position:relative;
  width:112px;
  height:112px;
  display:grid;
  place-items:center;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.17);
  border-radius:50%;
  background:rgba(255,255,255,.028);
  color:var(--fg);
  backdrop-filter:blur(12px);
  cursor:pointer;
  touch-action:none;
}

.awaken-button::before{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:50%;
  background:radial-gradient(circle,var(--glow-a),transparent 68%);
  opacity:.62;
  transition:
    opacity .3s var(--ease),
    transform .3s var(--ease);
}

.awaken-button.is-holding::before{
  opacity:1;
  transform:scale(1.16);
}

.awaken-flame{
  position:relative;
  z-index:2;
  width:34px;
  height:46px;
  transition:transform .28s var(--ease);
  filter:drop-shadow(0 0 24px var(--glow-a));
}

.awaken-button.is-holding .awaken-flame{
  transform:scale(.94);
}

.entry-ring{
  position:absolute;
  inset:0;
  pointer-events:none;
  transform:rotate(-90deg);
}

.ring-track,
.ring-value{
  fill:none;
  stroke-width:1.8;
}

.ring-track{
  stroke:rgba(255,255,255,.08);
}

.ring-value{
  stroke:rgba(255,255,255,.9);
  stroke-linecap:round;
  stroke-dasharray:439.82;
  stroke-dashoffset:439.82;
  filter:drop-shadow(0 0 9px rgba(255,255,255,.34));
}

.entry-instruction{
  position:absolute;
  top:calc(100% + 15px);
  left:50%;
  width:240px;
  transform:translateX(-50%);
  color:var(--muted);
  font-size:10px;
  letter-spacing:.1em;
}

.quick-entry{
  margin-top:38px;
  padding:8px 10px;
  border:0;
  background:transparent;
  color:var(--faint);
  font-size:11px;
  text-decoration:underline;
  text-underline-offset:5px;
  cursor:pointer;
  opacity:0;
  animation:showQuick .7s 4s forwards;
}

@keyframes showQuick{
  to{opacity:1}
}

/* ---------- 色調瀏覽 ---------- */

.experience{
  position:absolute;
  inset:0;
  z-index:10;
  opacity:0;
  visibility:hidden;
  transition:
    opacity 1s var(--ease),
    visibility 1s;
}

.experience.is-visible{
  opacity:1;
  visibility:visible;
}

.scroller{
  position:absolute;
  inset:0;
  overflow-y:auto;
  overscroll-behavior:contain;
  scroll-snap-type:y mandatory;
  scrollbar-width:none;
  touch-action:pan-y;
  -webkit-overflow-scrolling:touch;
}

.scroller::-webkit-scrollbar{
  display:none;
}

.tone{
  position:relative;
  min-height:100dvh;
  display:flex;
  align-items:flex-end;
  padding:
    118px
    24px
    calc(var(--safe-bottom) + 94px);
  scroll-snap-align:start;
  scroll-snap-stop:always;
}

.tone-content{
  position:relative;
  z-index:3;
  width:min(100%,1120px);
  margin:0 auto;
  display:grid;
  gap:25px;
}

.tone-number{
  color:var(--faint);
  font-size:10px;
  letter-spacing:.24em;
  opacity:.5;
  transition:opacity .5s var(--ease);
}

.tone-title{
  margin:4px 0 0;
  max-width:880px;
  font-size:clamp(48px,13vw,124px);
  font-weight:380;
  line-height:.9;
  letter-spacing:-.045em;
  text-shadow:0 18px 70px rgba(0,0,0,.38);
  opacity:.08;
  transform:translateY(26px);
  filter:blur(5px);
  transition:
    opacity .7s var(--ease),
    transform .9s var(--ease),
    filter .8s var(--ease);
}

.tone-meta{
  max-width:470px;
  display:flex;
  flex-direction:column;
  gap:18px;
  opacity:0;
  transform:translateY(18px);
  pointer-events:none;
  transition:
    opacity .7s .15s var(--ease),
    transform .8s .15s var(--ease);
}

.tone-description{
  max-width:410px;
  color:var(--muted);
  font-size:14px;
  line-height:1.85;
}

.swatches{
  display:flex;
  gap:8px;
}

.swatch{
  width:46px;
  height:5px;
  border:1px solid rgba(255,255,255,.11);
  border-radius:99px;
  box-shadow:0 5px 24px rgba(0,0,0,.28);
}

.select-tone{
  align-self:flex-start;
  margin-top:3px;
  padding:14px 20px;
  border:1px solid rgba(255,255,255,.19);
  border-radius:999px;
  background:rgba(255,255,255,.045);
  color:var(--fg);
  font-size:12px;
  letter-spacing:.08em;
  cursor:pointer;
  opacity:0;
  transform:translateY(10px);
  pointer-events:none;
  transition:
    opacity .6s .4s var(--ease),
    transform .7s .4s var(--ease),
    background .25s ease;
}

.select-tone:active{
  background:rgba(255,255,255,.12);
}

/* 只有完全停穩的當前色調才顯示內容與按鈕 */
.tone.is-settled .tone-number{
  opacity:1;
}

.tone.is-settled .tone-title{
  opacity:1;
  transform:none;
  filter:blur(0);
}

.tone.is-settled .tone-meta{
  opacity:1;
  transform:none;
  pointer-events:auto;
}

.tone.is-settled .select-tone{
  opacity:1;
  transform:none;
  pointer-events:auto;
}

/* 拖曳或慣性滑動時，所有內容先退場 */
.experience[data-motion="dragging"] .tone-title,
.experience[data-motion="coasting"] .tone-title,
.experience[data-motion="snapping"] .tone-title{
  opacity:.06;
  transform:translateY(22px);
  filter:blur(5px);
  transition-duration:.22s;
}

.experience[data-motion="dragging"] .tone-meta,
.experience[data-motion="coasting"] .tone-meta,
.experience[data-motion="snapping"] .tone-meta{
  opacity:0;
  transform:translateY(14px);
  pointer-events:none;
  transition-delay:0s;
  transition-duration:.18s;
}

.experience[data-motion="dragging"] .select-tone,
.experience[data-motion="coasting"] .select-tone,
.experience[data-motion="snapping"] .select-tone{
  opacity:0;
  pointer-events:none;
  transition-delay:0s;
  transition-duration:.15s;
}

.page-index{
  position:absolute;
  z-index:20;
  top:50%;
  right:22px;
  display:flex;
  flex-direction:column;
  gap:12px;
  transform:translateY(-50%);
  pointer-events:none;
}

.page-index span{
  width:4px;
  height:4px;
  border-radius:50%;
  background:rgba(255,255,255,.25);
  transition:
    width .35s var(--ease),
    height .35s var(--ease),
    background .35s var(--ease),
    box-shadow .35s var(--ease);
}

.page-index span.is-active{
  width:6px;
  height:6px;
  background:#fff;
  box-shadow:0 0 18px rgba(255,255,255,.62);
}

.browse-guide{
  position:absolute;
  z-index:20;
  left:24px;
  bottom:calc(var(--safe-bottom) + 24px);
  color:var(--faint);
  font-size:10px;
  letter-spacing:.08em;
  pointer-events:none;
  transition:opacity .35s ease;
}

.experience[data-motion="settled"] .browse-guide{
  opacity:.72;
}

/* ---------- 獨立選擇模式 ---------- */

.selection-overlay{
  --hold-progress:0;
  --pressure:0;
  position:absolute;
  inset:0;
  z-index:100;
  display:grid;
  place-items:center;
  padding:
    calc(var(--safe-top) + 26px)
    24px
    calc(var(--safe-bottom) + 24px);
  background:rgba(4,4,6,.58);
  backdrop-filter:blur(26px);
  opacity:0;
  visibility:hidden;
  transition:
    opacity .65s var(--ease),
    visibility .65s;
  touch-action:none;
}

.selection-overlay.is-open{
  opacity:1;
  visibility:visible;
}

.selection-space{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

.selection-space::before,
.selection-space::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:
    transform .9s var(--ease),
    opacity .9s var(--ease),
    filter .9s var(--ease);
}

.selection-space::before{
  width:84vmax;
  height:84vmax;
  background:radial-gradient(circle,var(--glow-a),transparent 66%);
  filter:blur(44px);
  opacity:.52;
  transform:
    translate(-50%,-50%)
    scale(calc(1 + var(--hold-progress) * .18));
}

.selection-space::after{
  width:54vmax;
  height:54vmax;
  background:radial-gradient(circle,var(--glow-b),transparent 68%);
  filter:blur(34px);
  opacity:.34;
  transform:
    translate(-50%,-50%)
    scale(calc(1 + var(--hold-progress) * .26));
}

.selection-overlay.is-completing .selection-space::before,
.selection-overlay.is-completing .selection-space::after{
  opacity:.9;
  filter:blur(18px);
  transform:translate(-50%,-50%) scale(.08);
}

.selection-card{
  position:relative;
  z-index:3;
  width:min(100%,560px);
  min-height:520px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:36px 22px 30px;
  text-align:center;
  perspective:1000px;
}

.selection-caption{
  color:var(--muted);
  font-size:11px;
  letter-spacing:.11em;
  transition:
    opacity .35s ease,
    transform .6s var(--ease);
}

.selection-title{
  margin:15px 0 10px;
  font-size:clamp(38px,10vw,68px);
  font-weight:390;
  line-height:1;
  letter-spacing:-.035em;
  transition:
    opacity .35s ease,
    transform .7s var(--ease);
}

.selection-copy{
  max-width:390px;
  margin:0;
  color:var(--muted);
  font-size:13px;
  line-height:1.8;
  transition:
    opacity .35s ease,
    transform .7s var(--ease);
}

.confirm-shell{
  position:relative;
  width:190px;
  height:190px;
  margin:34px auto 0;
  display:grid;
  place-items:center;
  transform:
    perspective(900px)
    translateZ(calc(var(--hold-progress) * 62px))
    scale(calc(1 - var(--hold-progress) * .06));
  transition:transform .06s linear;
}

.confirm-button{
  position:relative;
  width:132px;
  height:132px;
  display:grid;
  place-items:center;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.2);
  border-radius:50%;
  background:
    radial-gradient(
      circle at 50% 56%,
      rgba(255,255,255,calc(.025 + var(--hold-progress) * .06)),
      rgba(255,255,255,.015) 58%,
      transparent 72%
    );
  color:var(--fg);
  cursor:pointer;
  touch-action:none;
  transform:
    scale(calc(1 - var(--hold-progress) * .08 + var(--pressure) * .025));
  box-shadow:
    0 0 calc(18px + var(--hold-progress) * 42px) var(--glow-a),
    inset 0 0 calc(8px + var(--hold-progress) * 24px) rgba(255,255,255,.025);
}

.confirm-button::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    conic-gradient(
      rgba(255,255,255,.92)
      calc(var(--hold-progress) * 1turn),
      rgba(255,255,255,.08) 0
    );
  -webkit-mask:radial-gradient(circle,transparent 67%,#000 69%);
  mask:radial-gradient(circle,transparent 67%,#000 69%);
}

.confirm-button::after{
  content:"";
  position:absolute;
  inset:12px;
  border-radius:50%;
  background:radial-gradient(circle,var(--glow-a),transparent 70%);
  opacity:calc(.34 + var(--hold-progress) * .66);
  transform:scale(calc(.92 + var(--hold-progress) * .2 + var(--pressure) * .04));
  filter:blur(calc(14px - var(--hold-progress) * 7px));
}

.confirm-flame{
  position:relative;
  z-index:2;
  width:38px;
  height:52px;
  filter:
    drop-shadow(
      0 0
      calc(18px + var(--hold-progress) * 25px)
      rgba(255,255,255,.34)
    );
  transform:
    scale(
      calc(
        1
        - var(--hold-progress) * .08
        + var(--pressure) * .05
      )
    );
}

.confirm-instruction{
  position:absolute;
  top:calc(100% + 15px);
  left:50%;
  width:260px;
  transform:translateX(-50%);
  color:var(--muted);
  font-size:11px;
  letter-spacing:.07em;
}

.cancel-selection{
  margin-top:43px;
  padding:11px 14px;
  border:0;
  background:transparent;
  color:var(--faint);
  font-size:12px;
  text-decoration:underline;
  text-underline-offset:5px;
  cursor:pointer;
}

/* 完成時，瀏覽文字退場，中央火焰收束 */
.selection-overlay.is-completing .selection-caption,
.selection-overlay.is-completing .selection-title,
.selection-overlay.is-completing .selection-copy,
.selection-overlay.is-completing .confirm-instruction,
.selection-overlay.is-completing .cancel-selection{
  opacity:0;
  transform:translateY(-8px);
}

.selection-overlay.is-completing .confirm-shell{
  transform:perspective(900px) translateZ(150px) scale(.74);
  transition:transform .9s var(--ease);
}

.selection-overlay.is-completing .confirm-button{
  transform:scale(.82);
  box-shadow:
    0 0 90px var(--glow-a),
    inset 0 0 40px rgba(255,255,255,.06);
  transition:
    transform .9s var(--ease),
    box-shadow .9s var(--ease);
}

/* 完成結果 */
.result-panel{
  position:absolute;
  z-index:5;
  width:min(calc(100% - 48px),520px);
  padding:34px 26px 28px;
  border:1px solid rgba(255,255,255,.14);
  background:
    linear-gradient(
      145deg,
      rgba(255,255,255,.085),
      rgba(255,255,255,.022)
    );
  box-shadow:0 28px 110px rgba(0,0,0,.46);
  opacity:0;
  visibility:hidden;
  transform:translateY(18px);
  transition:
    opacity .7s var(--ease),
    visibility .7s,
    transform .8s var(--ease);
}

.selection-overlay.is-confirmed .selection-card{
  opacity:0;
  visibility:hidden;
}

.selection-overlay.is-confirmed .result-panel{
  opacity:1;
  visibility:visible;
  transform:none;
}

.result-label{
  color:var(--muted);
  font-size:11px;
  letter-spacing:.1em;
}

.result-title{
  margin:17px 0 11px;
  font-size:clamp(37px,10vw,62px);
  font-weight:390;
  line-height:1;
  letter-spacing:-.035em;
}

.result-copy{
  margin:0;
  color:var(--muted);
  font-size:14px;
  line-height:1.85;
}

.result-note{
  margin-top:19px;
  padding-top:17px;
  border-top:1px solid var(--line);
  color:var(--faint);
  font-size:11px;
  line-height:1.7;
}

.return-button{
  margin-top:25px;
  padding:13px 18px;
  border:1px solid rgba(255,255,255,.18);
  border-radius:999px;
  background:rgba(255,255,255,.04);
  color:var(--fg);
  font-size:12px;
  cursor:pointer;
}

/* ---------- 桌機版才啟用極輕微游標空間偏移 ---------- */

@media (pointer:fine){
  .environment{
    cursor:default;
  }
}

/* ---------- 寬螢幕 ---------- */

@media(min-width:820px){
  .site-header{
    padding-left:40px;
    padding-right:40px;
  }

  .tone{
    align-items:center;
    padding:108px 8vw;
  }

  .tone-content{
    grid-template-columns:minmax(0,1fr) 380px;
    align-items:end;
  }

  .tone-meta{
    padding-bottom:5px;
  }

  .page-index{
    right:34px;
  }

  .browse-guide{
    left:40px;
  }
}

/* ---------- 動態減量偏好 ---------- */

@media(prefers-reduced-motion:reduce){
  *,
  *::before,
  *::after{
    animation:none !important;
    transition-duration:.01ms !important;
    scroll-behavior:auto !important;
  }
}
</style>
</head>

<body>
<main class="app" id="app">

  <div class="environment" id="environment" aria-hidden="true">
    <div class="layer layer-far"></div>
    <div class="layer layer-mid"></div>
    <div class="layer layer-near"></div>
  </div>

  <div class="grain" aria-hidden="true"></div>

  <header class="site-header">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 48 64" fill="none" aria-hidden="true">
        <path d="M24 3C23 17 9 21 9 39c0 12 7 21 15 22 8-1 15-10 15-22C39 21 25 17 24 3Z" stroke="currentColor" stroke-width="1.4"/>
        <path d="M24 18c-1 9-8 12-8 22 0 7 4 13 8 14 4-1 8-7 8-14 0-10-7-13-8-22Z" stroke="currentColor" stroke-width="1.1" opacity=".62"/>
      </svg>
      <span>HESTIA</span>
    </div>
    <div class="section-name">色調聖所</div>
  </header>

  <section class="intro" id="intro">
    <div class="intro-inner">
      <div class="intro-kicker">一個會回應你的安靜空間</div>

      <h1>喚醒<br>你的火焰</h1>

      <p class="intro-copy">
        不急著做出選擇。<br>
        先停留片刻，讓空間感覺到你的存在。
      </p>

      <div class="awaken-shell">
        <button class="awaken-button" id="awakenButton" aria-label="長按火焰進入色調聖所">
          <svg class="awaken-flame" viewBox="0 0 48 64" fill="none" aria-hidden="true">
            <path d="M24 3C23 17 9 21 9 39c0 12 7 21 15 22 8-1 15-10 15-22C39 21 25 17 24 3Z" stroke="currentColor" stroke-width="1.35"/>
            <path d="M24 18c-1 9-8 12-8 22 0 7 4 13 8 14 4-1 8-7 8-14 0-10-7-13-8-22Z" stroke="currentColor" stroke-width="1.1" opacity=".62"/>
          </svg>
        </button>

        <svg class="entry-ring" viewBox="0 0 152 152" aria-hidden="true">
          <circle class="ring-track" cx="76" cy="76" r="70"></circle>
          <circle class="ring-value" id="entryRing" cx="76" cy="76" r="70"></circle>
        </svg>

        <div class="entry-instruction" id="entryInstruction">
          長按火焰，進入色調聖所
        </div>
      </div>

      <button class="quick-entry" id="quickEntry">
        直接進入體驗
      </button>
    </div>
  </section>

  <section class="experience" id="experience" data-motion="settled">
    <div class="page-index" id="pageIndex" aria-hidden="true"></div>

    <div class="scroller" id="scroller"></div>

    <div class="browse-guide" id="browseGuide">
      上下滑動，感受色調之間的變化
    </div>
  </section>

  <section class="selection-overlay" id="selectionOverlay" aria-hidden="true">
    <div class="selection-space" aria-hidden="true"></div>

    <div class="selection-card">
      <div class="selection-caption">你正在選擇</div>

      <h2 class="selection-title" id="selectionTitle">餘燼霧紅</h2>

      <p class="selection-copy" id="selectionCopy">
        安靜而集中，像未曾熄滅的內在熱度。
      </p>

      <div class="confirm-shell">
        <button class="confirm-button" id="confirmButton" aria-label="長按確認這組色調">
          <svg class="confirm-flame" viewBox="0 0 48 64" fill="none" aria-hidden="true">
            <path d="M24 3C23 17 9 21 9 39c0 12 7 21 15 22 8-1 15-10 15-22C39 21 25 17 24 3Z" stroke="currentColor" stroke-width="1.4"/>
            <path d="M24 18c-1 9-8 12-8 22 0 7 4 13 8 14 4-1 8-7 8-14 0-10-7-13-8-22Z" stroke="currentColor" stroke-width="1.1" opacity=".62"/>
          </svg>
        </button>

        <div class="confirm-instruction" id="confirmInstruction">
          長按火焰，確認這次選擇
        </div>
      </div>

      <button class="cancel-selection" id="cancelSelection">
        返回繼續查看
      </button>
    </div>

    <div class="result-panel">
      <div class="result-label">已收到你的選擇</div>

      <h2 class="result-title" id="resultTitle">餘燼霧紅</h2>

      <p class="result-copy" id="resultCopy">
        安靜而集中，像未曾熄滅的內在熱度。
      </p>

      <div class="result-note">
        目前為體驗版本，選擇只會暫存在這台裝置，尚未連接正式投票資料庫。
      </div>

      <button class="return-button" id="returnButton">
        返回色調空間
      </button>
    </div>
  </section>

</main>

<script>
(() => {
  "use strict";

  const tones = [
    {
      name:"餘燼霧紅",
      description:"安靜而集中，像未曾熄滅的內在熱度。",
      colors:["#4b1119","#7e2530","#b46563","#d4a59b"],
      a:"#ab484e",
      b:"#671a23",
      base:"#18090d"
    },
    {
      name:"玫瑰煙粉",
      description:"柔和不等於退讓，溫度與意志可以同時存在。",
      colors:["#4c2930","#7c4e57","#ae7a80","#d9b3b4"],
      a:"#a96f79",
      b:"#6f414a",
      base:"#1a1013"
    },
    {
      name:"午夜深藍",
      description:"表面沉靜，底層仍持續流動。",
      colors:["#101a2b","#223654","#405f85","#7994b2"],
      a:"#496d96",
      b:"#203c62",
      base:"#070c15"
    },
    {
      name:"礦石鼠尾",
      description:"穩定、克制，也保有向外延伸的空間。",
      colors:["#26312d","#45584f","#71877a","#a7b5aa"],
      a:"#6f8a7d",
      b:"#3d564b",
      base:"#0d1310"
    }
  ];

  const app = document.getElementById("app");
  const intro = document.getElementById("intro");
  const awakenButton = document.getElementById("awakenButton");
  const entryRing = document.getElementById("entryRing");
  const entryInstruction = document.getElementById("entryInstruction");
  const quickEntry = document.getElementById("quickEntry");

  const experience = document.getElementById("experience");
  const scroller = document.getElementById("scroller");
  const pageIndex = document.getElementById("pageIndex");
  const browseGuide = document.getElementById("browseGuide");

  const selectionOverlay = document.getElementById("selectionOverlay");
  const selectionTitle = document.getElementById("selectionTitle");
  const selectionCopy = document.getElementById("selectionCopy");
  const confirmButton = document.getElementById("confirmButton");
  const confirmInstruction = document.getElementById("confirmInstruction");
  const cancelSelection = document.getElementById("cancelSelection");
  const resultTitle = document.getElementById("resultTitle");
  const resultCopy = document.getElementById("resultCopy");
  const returnButton = document.getElementById("returnButton");

  let activeIndex = 0;
  let motionState = "settled";
  let pointerDownInScroller = false;
  let scrollTimer = 0;
  let revealTimer = 0;
  let snapTimer = 0;
  let lastScrollTop = 0;
  let lastScrollTime = performance.now();
  let scrollVelocity = 0;
  let targetMidY = 0;
  let currentMidY = 0;
  let targetNearY = 0;
  let currentNearY = 0;
  let currentMidX = 0;
  let currentNearX = 0;
  let selectedIndex = 0;
  let selectionMode = false;

  const rootStyle = document.documentElement.style;
  const circumference = 439.82;

  function clamp(value,min,max){
    return Math.max(min,Math.min(max,value));
  }

  function hexToRgb(hex){
    const value = parseInt(hex.slice(1),16);
    return {
      r:(value >> 16) & 255,
      g:(value >> 8) & 255,
      b:value & 255
    };
  }

  function mixColor(hexA,hexB,t){
    const a = hexToRgb(hexA);
    const b = hexToRgb(hexB);

    return {
      r:Math.round(a.r + (b.r-a.r)*t),
      g:Math.round(a.g + (b.g-a.g)*t),
      b:Math.round(a.b + (b.b-a.b)*t)
    };
  }

  function rgbString(rgb,alpha){
    return `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
  }

  function rgbHex(rgb){
    return "#" + [rgb.r,rgb.g,rgb.b]
      .map(value => value.toString(16).padStart(2,"0"))
      .join("");
  }

  function setEnvironment(indexA,indexB,progress){
    const toneA = tones[indexA];
    const toneB = tones[indexB];

    const colorA = mixColor(toneA.a,toneB.a,progress);
    const colorB = mixColor(toneA.b,toneB.b,progress);
    const base = mixColor(toneA.base,toneB.base,progress);

    rootStyle.setProperty("--glow-a",rgbString(colorA,.35));
    rootStyle.setProperty("--glow-b",rgbString(colorB,.25));
    rootStyle.setProperty("--base",rgbHex(base));
  }

  function vibrate(pattern){
    if("vibrate" in navigator){
      navigator.vibrate(pattern);
    }
  }

  function setMotionState(nextState){
    motionState = nextState;
    experience.dataset.motion = nextState;
  }

  function clearSettledContent(){
    window.clearTimeout(revealTimer);
    document
      .querySelectorAll(".tone.is-settled")
      .forEach(section => section.classList.remove("is-settled"));
  }

  function showSettledContent(index){
    clearSettledContent();

    revealTimer = window.setTimeout(() => {
      const section = document.querySelector(`.tone[data-index="${index}"]`);
      if(
        section &&
        motionState === "settled" &&
        !selectionMode
      ){
        section.classList.add("is-settled");
      }
    },420);
  }

  function updatePageIndex(index){
    [...pageIndex.children].forEach((dot,dotIndex) => {
      dot.classList.toggle("is-active",dotIndex === index);
    });
  }

  function finalizeSettled(){
    if(pointerDownInScroller || selectionMode){
      return;
    }

    const height = scroller.clientHeight || window.innerHeight;
    const nearestIndex = clamp(
      Math.round(scroller.scrollTop / height),
      0,
      tones.length - 1
    );

    const targetTop = nearestIndex * height;
    const distance = Math.abs(scroller.scrollTop - targetTop);

    if(distance > 1.5){
      setMotionState("snapping");
      clearSettledContent();

      scroller.scrollTo({
        top:targetTop,
        behavior:"smooth"
      });

      window.clearTimeout(snapTimer);
      snapTimer = window.setTimeout(finalizeSettled,430);
      return;
    }

    activeIndex = nearestIndex;
    updatePageIndex(activeIndex);
    setMotionState("settled");
    browseGuide.textContent = "停留片刻，感受這組色調";
    showSettledContent(activeIndex);
  }

  function scheduleSettle(){
    window.clearTimeout(scrollTimer);

    scrollTimer = window.setTimeout(() => {
      if(pointerDownInScroller || selectionMode){
        return;
      }

      const current = scroller.scrollTop;

      window.setTimeout(() => {
        if(
          Math.abs(scroller.scrollTop - current) < .6 &&
          !pointerDownInScroller &&
          !selectionMode
        ){
          finalizeSettled();
        }else{
          scheduleSettle();
        }
      },90);
    },120);
  }

  function handleScroll(){
    if(selectionMode){
      return;
    }

    const now = performance.now();
    const currentTop = scroller.scrollTop;
    const delta = currentTop - lastScrollTop;
    const deltaTime = Math.max(8,now-lastScrollTime);

    scrollVelocity = delta / deltaTime;
    lastScrollTop = currentTop;
    lastScrollTime = now;

    if(pointerDownInScroller){
      setMotionState("dragging");
    }else{
      setMotionState("coasting");
    }

    clearSettledContent();
    browseGuide.textContent = "上下滑動，感受色調之間的變化";

    const height = scroller.clientHeight || window.innerHeight;
    const raw = clamp(
      currentTop / height,
      0,
      tones.length - 1
    );

    const currentIndex = Math.floor(raw);
    const nextIndex = Math.min(tones.length-1,currentIndex+1);
    const progress = raw-currentIndex;

    setEnvironment(currentIndex,nextIndex,progress);

    const nearestIndex = clamp(
      Math.round(raw),
      0,
      tones.length - 1
    );

    updatePageIndex(nearestIndex);

    targetMidY = clamp(scrollVelocity*180,-20,20);
    targetNearY = clamp(scrollVelocity*310,-32,32);

    scheduleSettle();
  }

  function animateLayers(){
    currentMidY += (targetMidY-currentMidY)*.075;
    currentNearY += (targetNearY-currentNearY)*.1;

    targetMidY *= .92;
    targetNearY *= .89;

    rootStyle.setProperty("--mid-y",`${currentMidY}px`);
    rootStyle.setProperty("--near-y",`${currentNearY}px`);
    rootStyle.setProperty("--mid-x",`${currentMidX}px`);
    rootStyle.setProperty("--near-x",`${currentNearX}px`);

    requestAnimationFrame(animateLayers);
  }

  tones.forEach((tone,index) => {
    const dot = document.createElement("span");
    if(index === 0){
      dot.classList.add("is-active");
    }
    pageIndex.appendChild(dot);

    const section = document.createElement("section");
    section.className = "tone";
    section.dataset.index = String(index);

    section.innerHTML = `
      <div class="tone-content">
        <div>
          <div class="tone-number">
            ${String(index+1).padStart(2,"0")}／${String(tones.length).padStart(2,"0")}
          </div>

          <h2 class="tone-title">${tone.name}</h2>
        </div>

        <div class="tone-meta">
          <div class="tone-description">${tone.description}</div>

          <div class="swatches">
            ${tone.colors.map(color => `
              <span class="swatch" style="background:${color}"></span>
            `).join("")}
          </div>

          <button
            class="select-tone"
            type="button"
            data-index="${index}"
          >
            選擇這組色調
          </button>
        </div>
      </div>
    `;

    scroller.appendChild(section);
  });

  /* ---------- 首屏長按 ---------- */

  let entryHolding = false;
  let entryStart = 0;
  let entryFrame = 0;
  let entryPointerId = null;
  const entryDuration = 1450;

  function resetEntry(){
    entryHolding = false;
    entryPointerId = null;
    cancelAnimationFrame(entryFrame);
    awakenButton.classList.remove("is-holding");
    entryRing.style.strokeDashoffset = String(circumference);
    entryInstruction.textContent = "長按火焰，進入色調聖所";
  }

  function enterExperience(){
    resetEntry();

    intro.classList.add("is-hidden");
    experience.classList.add("is-visible");

    window.setTimeout(() => {
      setMotionState("settled");
      showSettledContent(0);
    },780);

    vibrate(16);
  }

  function entryTick(now){
    if(!entryHolding){
      return;
    }

    const progress = clamp(
      (now-entryStart)/entryDuration,
      0,
      1
    );

    entryRing.style.strokeDashoffset =
      String(circumference*(1-progress));

    if(progress < .72){
      entryInstruction.textContent = "再停留一下";
    }else{
      entryInstruction.textContent = "正在喚醒";
    }

    if(progress >= 1){
      enterExperience();
      return;
    }

    entryFrame = requestAnimationFrame(entryTick);
  }

  awakenButton.addEventListener("pointerdown",event => {
    event.preventDefault();

    entryHolding = true;
    entryStart = performance.now();
    entryPointerId = event.pointerId;
    awakenButton.setPointerCapture(event.pointerId);
    awakenButton.classList.add("is-holding");
    vibrate(7);

    entryFrame = requestAnimationFrame(entryTick);
  });

  awakenButton.addEventListener("pointerup",resetEntry);
  awakenButton.addEventListener("pointercancel",resetEntry);
  quickEntry.addEventListener("click",enterExperience);

  /* ---------- 瀏覽狀態機 ---------- */

  scroller.addEventListener("pointerdown",() => {
    if(selectionMode){
      return;
    }

    pointerDownInScroller = true;
    setMotionState("dragging");
    clearSettledContent();
  },{passive:true});

  scroller.addEventListener("pointerup",() => {
    if(selectionMode){
      return;
    }

    pointerDownInScroller = false;
    setMotionState("coasting");
    scheduleSettle();
  },{passive:true});

  scroller.addEventListener("pointercancel",() => {
    pointerDownInScroller = false;
    scheduleSettle();
  },{passive:true});

  scroller.addEventListener("scroll",handleScroll,{passive:true});

  if("onscrollend" in window){
    scroller.addEventListener("scrollend",() => {
      if(!pointerDownInScroller && !selectionMode){
        finalizeSettled();
      }
    },{passive:true});
  }

  /* ---------- 桌機才有極輕微游標慣性 ---------- */

  if(window.matchMedia("(pointer:fine)").matches){
    let targetX = 0;
    let targetY = 0;
    let desktopX = 0;
    let desktopY = 0;

    app.addEventListener("pointermove",event => {
      targetX = ((event.clientX/window.innerWidth)-.5)*10;
      targetY = ((event.clientY/window.innerHeight)-.5)*8;
    },{passive:true});

    const desktopLoop = () => {
      desktopX += (targetX-desktopX)*.035;
      desktopY += (targetY-desktopY)*.035;

      rootStyle.setProperty("--desktop-x",`${desktopX}px`);
      rootStyle.setProperty("--desktop-y",`${desktopY}px`);

      requestAnimationFrame(desktopLoop);
    };

    desktopLoop();
  }

  /* ---------- 進入獨立選擇模式 ---------- */

  function openSelection(index){
    if(motionState !== "settled"){
      return;
    }

    selectedIndex = index;
    selectionMode = true;
    const tone = tones[index];

    selectionTitle.textContent = tone.name;
    selectionCopy.textContent = tone.description;
    resultTitle.textContent = tone.name;
    resultCopy.textContent = tone.description;

    selectionOverlay.classList.remove(
      "is-completing",
      "is-confirmed"
    );

    selectionOverlay.style.setProperty("--hold-progress","0");
    selectionOverlay.style.setProperty("--pressure","0");
    selectionOverlay.classList.add("is-open");
    selectionOverlay.setAttribute("aria-hidden","false");

    scroller.style.overflow = "hidden";
    browseGuide.style.opacity = "0";
    confirmInstruction.textContent = "長按火焰，確認這次選擇";

    vibrate(7);
  }

  function closeSelection(){
    cancelHold();

    selectionMode = false;
    selectionOverlay.classList.remove(
      "is-open",
      "is-completing",
      "is-confirmed"
    );
    selectionOverlay.setAttribute("aria-hidden","true");
    scroller.style.overflow = "auto";
    browseGuide.style.opacity = "";
    setMotionState("settled");
    showSettledContent(activeIndex);
  }

  scroller.addEventListener("click",event => {
    const button = event.target.closest(".select-tone");

    if(!button){
      return;
    }

    event.preventDefault();

    const index = Number(button.dataset.index);

    if(
      index === activeIndex &&
      motionState === "settled"
    ){
      openSelection(index);
    }
  });

  cancelSelection.addEventListener("click",closeSelection);
  returnButton.addEventListener("click",closeSelection);

  /* ---------- 選擇模式內的長按確認 ---------- */

  let holdActive = false;
  let holdStart = 0;
  let holdFrame = 0;
  let holdPointerId = null;
  let holdStartX = 0;
  let holdStartY = 0;
  let latestPressure = 0;
  let truePressureDetected = false;
  const holdDuration = 1450;
  const movementTolerance = 8;

  function pressureVisual(rawPressure,pointerType){
    if(pointerType === "pen"){
      truePressureDetected = true;
    }

    if(
      rawPressure > 0 &&
      Math.abs(rawPressure-.5) > .07
    ){
      truePressureDetected = true;
    }

    if(!truePressureDetected){
      return 0;
    }

    return clamp(rawPressure,0,1);
  }

  function cancelHold(){
    holdActive = false;
    holdPointerId = null;
    latestPressure = 0;
    truePressureDetected = false;
    cancelAnimationFrame(holdFrame);

    selectionOverlay.style.setProperty("--hold-progress","0");
    selectionOverlay.style.setProperty("--pressure","0");
    confirmInstruction.textContent = "長按火焰，確認這次選擇";
  }

  function completeSelection(){
    holdActive = false;
    cancelAnimationFrame(holdFrame);

    selectionOverlay.style.setProperty("--hold-progress","1");
    selectionOverlay.classList.add("is-completing");
    confirmInstruction.textContent = "正在收束這組色調";

    const record = {
      tone:tones[selectedIndex].name,
      selectedAt:new Date().toISOString()
    };

    try{
      localStorage.setItem(
        "hestiaToneSanctuaryV4",
        JSON.stringify(record)
      );
    }catch(error){
      /* 無法使用 localStorage 時仍可完成體驗 */
    }

    vibrate([16,40,22]);

    window.setTimeout(() => {
      selectionOverlay.classList.remove("is-completing");
      selectionOverlay.classList.add("is-confirmed");
    },980);
  }

  function holdTick(now){
    if(!holdActive){
      return;
    }

    const elapsed = now-holdStart;
    const progress = clamp(elapsed/holdDuration,0,1);

    selectionOverlay.style.setProperty(
      "--hold-progress",
      String(progress)
    );

    selectionOverlay.style.setProperty(
      "--pressure",
      String(latestPressure)
    );

    if(progress < .45){
      confirmInstruction.textContent = "保持按住";
    }else if(progress < .82){
      confirmInstruction.textContent = "再停留一下";
    }else{
      confirmInstruction.textContent = "正在確認";
    }

    if(progress >= 1){
      completeSelection();
      return;
    }

    holdFrame = requestAnimationFrame(holdTick);
  }

  confirmButton.addEventListener("pointerdown",event => {
    if(!selectionMode){
      return;
    }

    event.preventDefault();

    holdActive = true;
    holdStart = performance.now();
    holdPointerId = event.pointerId;
    holdStartX = event.clientX;
    holdStartY = event.clientY;
    latestPressure = pressureVisual(
      event.pressure,
      event.pointerType
    );

    confirmButton.setPointerCapture(event.pointerId);
    vibrate(6);

    holdFrame = requestAnimationFrame(holdTick);
  });

  confirmButton.addEventListener("pointermove",event => {
    if(
      !holdActive ||
      event.pointerId !== holdPointerId
    ){
      return;
    }

    const distance = Math.hypot(
      event.clientX-holdStartX,
      event.clientY-holdStartY
    );

    if(distance > movementTolerance){
      cancelHold();
      confirmInstruction.textContent = "手指移動過多，請重新長按";
      return;
    }

    latestPressure = pressureVisual(
      event.pressure,
      event.pointerType
    );
  });

  confirmButton.addEventListener("pointerup",event => {
    if(event.pointerId === holdPointerId && holdActive){
      cancelHold();
    }
  });

  confirmButton.addEventListener("pointercancel",cancelHold);

  /* ---------- 初始化 ---------- */

  setEnvironment(0,0,0);
  animateLayers();

})();
</script>
</body>
</html>
