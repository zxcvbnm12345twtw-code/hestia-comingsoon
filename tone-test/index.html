<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#07070a" />
<title>HESTIA — Living Tone Sanctuary</title>

<style>
  :root{
    --fg:#f5f0ea;
    --muted:rgba(245,240,234,.56);
    --line:rgba(255,255,255,.14);

    --px:50%;
    --py:48%;

    --a:#a94a50;
    --b:#6d1823;
    --c:#1c090d;

    --safe-top:max(18px,env(safe-area-inset-top));
    --safe-bottom:max(18px,env(safe-area-inset-bottom));
    --ease:cubic-bezier(.22,.72,.24,1);
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  html,
  body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#07070a;
    color:var(--fg);
    font-family:
      Inter,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      "Noto Sans TC",
      "PingFang TC",
      "Microsoft JhengHei",
      sans-serif;
  }

  button{
    font:inherit;
  }

  body{
    overscroll-behavior:none;
  }

  .app{
    position:relative;
    width:100%;
    height:100dvh;
    min-height:100vh;
    overflow:hidden;
    background:#07070a;
    isolation:isolate;
  }

  .ambient{
    position:absolute;
    inset:0;
    z-index:0;
    overflow:hidden;

    background:
      radial-gradient(
        40vmax 40vmax at var(--px) var(--py),
        color-mix(in srgb,var(--a) 35%,transparent),
        transparent 66%
      ),
      radial-gradient(
        74vmax 58vmax at 78% 30%,
        color-mix(in srgb,var(--a) 28%,transparent),
        transparent 64%
      ),
      radial-gradient(
        70vmax 56vmax at 20% 74%,
        color-mix(in srgb,var(--b) 24%,transparent),
        transparent 64%
      ),
      linear-gradient(
        145deg,
        var(--c),
        #08080b 60%,
        #020203
      );

    transition:background 1.15s var(--ease);
  }

  .veil{
    position:absolute;
    inset:-8%;

    background:
      conic-gradient(
        from 210deg at 60% 45%,
        transparent 0 19%,
        rgba(255,255,255,.035) 25%,
        transparent 34% 64%,
        rgba(255,255,255,.022) 72%,
        transparent 82%
      );

    filter:blur(34px);
    opacity:.6;
    mix-blend-mode:soft-light;
    animation:veil 16s ease-in-out infinite alternate;
    transform-origin:center;
  }

  @keyframes veil{
    to{
      transform:translate3d(-2%,2%,0) rotate(4deg) scale(1.08);
      opacity:.82;
    }
  }

  .orb{
    position:absolute;
    border-radius:50%;
    filter:blur(54px);
    opacity:.38;
    mix-blend-mode:screen;
    pointer-events:none;
  }

  .orb.a{
    width:55vmax;
    height:55vmax;
    right:-34vmax;
    top:-18vmax;
    background:var(--a);
    animation:orbA 15s ease-in-out infinite alternate;
  }

  .orb.b{
    width:46vmax;
    height:46vmax;
    left:-30vmax;
    bottom:-14vmax;
    background:var(--b);
    animation:orbB 18s ease-in-out infinite alternate;
  }

  @keyframes orbA{
    to{
      transform:translate(-5vw,5vh) scale(1.1);
    }
  }

  @keyframes orbB{
    to{
      transform:translate(6vw,-3vh) scale(1.08);
    }
  }

  .grain{
    position:absolute;
    inset:-50%;
    z-index:80;
    pointer-events:none;
    opacity:.09;

    background-image:url(
      "data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.86' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.48'/%3E%3C/svg%3E"
    );

    animation:grain .2s steps(2) infinite;
    mix-blend-mode:soft-light;
  }

  @keyframes grain{
    0%{
      transform:translate(0);
    }

    25%{
      transform:translate(2%,-1%);
    }

    50%{
      transform:translate(-1%,2%);
    }

    75%{
      transform:translate(1%,1%);
    }

    100%{
      transform:translate(-2%,-1%);
    }
  }

  header{
    position:absolute;
    z-index:70;
    left:0;
    right:0;
    top:0;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:var(--safe-top) 22px 0;

    letter-spacing:.17em;
    font-size:11px;

    pointer-events:none;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
  }

  .flameMark{
    width:19px;
    height:25px;

    filter:
      drop-shadow(
        0 0 18px
        color-mix(in srgb,var(--a) 58%,transparent)
      );
  }

  .micro{
    color:var(--muted);
    font-size:9px;
    letter-spacing:.22em;
  }

  .intro{
    position:absolute;
    inset:0;
    z-index:50;

    display:grid;
    place-items:center;

    padding:92px 24px 88px;

    text-align:center;

    transition:
      opacity 1.05s var(--ease),
      visibility 1.05s,
      transform 1.05s var(--ease);
  }

  .intro.hidden{
    opacity:0;
    visibility:hidden;
    transform:scale(1.035);
  }

  .introInner{
    width:min(100%,660px);
  }

  .kicker{
    margin-bottom:28px;

    font-size:10px;
    letter-spacing:.36em;
    color:var(--muted);
  }

  h1{
    margin:0;

    font-size:clamp(45px,11vw,96px);
    font-weight:390;
    line-height:.92;
    letter-spacing:.015em;
  }

  .intro p{
    margin:26px auto 0;

    max-width:460px;

    color:var(--muted);
    line-height:1.9;
    font-size:14px;
  }

  .awakenWrap{
    position:relative;

    width:152px;
    height:152px;

    margin:38px auto 0;

    display:grid;
    place-items:center;
  }

  .awaken{
    position:relative;

    width:112px;
    height:112px;

    border-radius:50%;
    border:1px solid rgba(255,255,255,.16);

    background:rgba(255,255,255,.025);
    color:var(--fg);

    display:grid;
    place-items:center;

    cursor:pointer;
    backdrop-filter:blur(10px);

    touch-action:none;
    user-select:none;
    -webkit-user-select:none;

    overflow:hidden;
  }

  .awaken:before{
    content:"";

    position:absolute;
    inset:9px;

    border-radius:50%;

    background:
      radial-gradient(
        circle at 50% 55%,
        color-mix(in srgb,var(--a) 26%,transparent),
        transparent 64%
      );

    opacity:.55;

    transition:.35s var(--ease);
  }

  .awaken.holding:before{
    opacity:1;
    transform:scale(1.12);
  }

  .holdFlame{
    position:relative;
    z-index:3;

    width:34px;
    height:46px;

    filter:
      drop-shadow(
        0 0 26px
        color-mix(in srgb,var(--a) 65%,transparent)
      );

    transition:
      transform .35s var(--ease),
      opacity .35s;
  }

  .awaken.holding .holdFlame{
    transform:scale(1.08);
    opacity:1;
  }

  .progressRing{
    position:absolute;
    inset:0;

    transform:rotate(-90deg);

    pointer-events:none;
  }

  .progressTrack{
    fill:none;
    stroke:rgba(255,255,255,.08);
    stroke-width:1.5;
  }

  .progressValue{
    fill:none;
    stroke:rgba(255,255,255,.88);
    stroke-width:1.8;
    stroke-linecap:round;

    stroke-dasharray:439.82;
    stroke-dashoffset:439.82;

    filter:drop-shadow(0 0 9px rgba(255,255,255,.36));
  }

  .holdLabel{
    position:absolute;

    top:calc(100% + 16px);
    left:50%;

    transform:translateX(-50%);

    width:220px;

    color:var(--muted);
    font-size:9px;
    letter-spacing:.2em;
  }

  .quickEnter{
    margin-top:38px;

    border:0;
    background:none;

    color:rgba(245,240,234,.34);

    font-size:9px;
    letter-spacing:.15em;
    text-decoration:underline;
    text-underline-offset:5px;

    cursor:pointer;

    opacity:0;

    animation:revealQuick .8s 4s forwards;
  }

  @keyframes revealQuick{
    to{
      opacity:1;
    }
  }

  .experience{
    position:absolute;
    inset:0;
    z-index:10;

    opacity:0;
    visibility:hidden;

    transition:
      opacity 1s var(--ease),
      visibility 1s;
  }

  .experience.visible{
    opacity:1;
    visibility:visible;
  }

  .scroller{
    position:absolute;
    inset:0;

    overflow-y:auto;

    overscroll-behavior:contain;
    scroll-snap-type:y mandatory;
    scrollbar-width:none;
  }

  .scroller::-webkit-scrollbar{
    display:none;
  }

  .tone{
    position:relative;

    min-height:100dvh;

    scroll-snap-align:start;

    display:flex;
    align-items:flex-end;

    padding:
      122px
      24px
      calc(var(--safe-bottom) + 86px);
  }

  .toneInner{
    position:relative;
    z-index:2;

    width:min(100%,1120px);

    margin:0 auto;

    display:grid;
    gap:26px;
  }

  .eyebrow{
    font-size:10px;
    letter-spacing:.3em;
    color:var(--muted);
    opacity:.48;
  }

  .toneName{
    margin:0;

    font-size:clamp(49px,13vw,128px);
    font-weight:380;
    line-height:.87;
    letter-spacing:-.045em;

    text-shadow:0 18px 70px rgba(0,0,0,.4);

    opacity:.18;
    transform:translateY(20px);

    transition:
      opacity 1.15s var(--ease),
      transform 1.15s var(--ease);
  }

  .meta{
    max-width:470px;

    display:flex;
    flex-direction:column;
    gap:18px;

    opacity:0;
    transform:translateY(14px);

    transition:
      opacity 1s .18s var(--ease),
      transform 1s .18s var(--ease);
  }

  .tone.settled .toneName{
    opacity:1;
    transform:none;
  }

  .tone.settled .meta{
    opacity:1;
    transform:none;
  }

  .desc{
    max-width:410px;

    font-size:13px;
    line-height:1.85;
    color:var(--muted);
  }

  .swatches{
    display:flex;
    gap:8px;
  }

  .swatch{
    width:46px;
    height:5px;

    border-radius:99px;
    border:1px solid rgba(255,255,255,.12);

    box-shadow:0 5px 24px rgba(0,0,0,.28);
  }

  .claimWrap{
    display:flex;
    align-items:center;
    gap:14px;

    margin-top:2px;
  }

  .claim{
    position:relative;

    width:74px;
    height:74px;

    border-radius:50%;
    border:1px solid rgba(255,255,255,.17);

    background:rgba(255,255,255,.035);
    color:var(--fg);

    display:grid;
    place-items:center;

    cursor:pointer;

    touch-action:none;
    user-select:none;
    -webkit-user-select:none;

    overflow:hidden;
  }

  .claim svg{
    position:relative;
    z-index:2;

    width:24px;
    height:32px;
  }

  .claim:before{
    content:"";

    position:absolute;
    inset:0;

    background:
      conic-gradient(
        var(--fg) var(--claim,0%),
        transparent 0
      );

    opacity:.9;

    mask:
      radial-gradient(
        circle,
        transparent 64%,
        #000 66%
      );

    -webkit-mask:
      radial-gradient(
        circle,
        transparent 64%,
        #000 66%
      );
  }

  .claimText{
    font-size:9px;
    letter-spacing:.18em;
    line-height:1.7;
    color:var(--muted);
  }

  .scrollHint{
    position:absolute;

    left:24px;
    bottom:calc(var(--safe-bottom) + 24px);

    font-size:9px;
    letter-spacing:.18em;

    color:rgba(245,240,234,.36);
  }

  .index{
    position:absolute;
    z-index:20;

    right:22px;
    top:50%;

    transform:translateY(-50%);

    display:flex;
    flex-direction:column;
    gap:12px;

    pointer-events:none;
  }

  .index span{
    width:4px;
    height:4px;

    border-radius:50%;

    background:rgba(255,255,255,.26);

    transition:.45s var(--ease);
  }

  .index span.active{
    width:6px;
    height:6px;

    background:#fff;

    box-shadow:0 0 18px rgba(255,255,255,.6);
  }

  .presence{
    position:absolute;
    z-index:4;

    width:120px;
    height:120px;

    left:0;
    top:0;

    transform:translate(-50%,-50%);

    border-radius:50%;

    background:
      radial-gradient(
        circle,
        rgba(255,255,255,.11),
        rgba(255,255,255,.025) 42%,
        transparent 70%
      );

    filter:blur(8px);
    opacity:0;

    pointer-events:none;

    mix-blend-mode:screen;

    transition:opacity .25s;
  }

  .result{
    position:absolute;
    inset:0;
    z-index:100;

    display:grid;
    place-items:center;

    padding:24px;

    background:rgba(5,5,7,.7);

    backdrop-filter:blur(30px);

    opacity:0;
    visibility:hidden;

    transition:.7s var(--ease);
  }

  .result.open{
    opacity:1;
    visibility:visible;
  }

  .resultCard{
    width:min(100%,540px);

    padding:36px 28px 30px;

    border:1px solid var(--line);

    background:
      linear-gradient(
        145deg,
        rgba(255,255,255,.09),
        rgba(255,255,255,.025)
      );

    box-shadow:0 28px 110px rgba(0,0,0,.45);
  }

  .resultLabel{
    font-size:9px;
    letter-spacing:.28em;
    color:var(--muted);
  }

  .result h2{
    margin:18px 0 12px;

    font-size:clamp(38px,10vw,64px);
    font-weight:390;
    letter-spacing:-.035em;
  }

  .result p{
    margin:0;

    color:var(--muted);
    font-size:13px;
    line-height:1.85;
  }

  .closeResult{
    margin-top:28px;

    border-radius:999px;
    border:1px solid var(--line);

    background:transparent;
    color:var(--fg);

    padding:13px 18px;

    font-size:10px;
    letter-spacing:.15em;

    cursor:pointer;
  }

  .received{
    margin-top:20px;
    padding-top:18px;

    border-top:1px solid var(--line);

    font-size:10px;
    line-height:1.7;
    color:var(--muted);
  }

  .jsNote{
    display:none;
  }

  noscript .jsNote{
    display:block;

    position:absolute;
    z-index:200;

    inset:auto 20px 20px;

    padding:14px;

    border:1px solid var(--line);

    background:#111;
    color:var(--muted);

    font-size:12px;
    line-height:1.6;
  }

  @media(min-width:820px){
    header{
      padding-left:40px;
      padding-right:40px;
    }

    .tone{
      align-items:center;
      padding:110px 8vw;
    }

    .toneInner{
      grid-template-columns:minmax(0,1fr) 370px;
      align-items:end;
    }

    .meta{
      padding-bottom:4px;
    }

    .scrollHint{
      left:40px;
    }

    .index{
      right:34px;
    }
  }

  @media(prefers-reduced-motion:reduce){
    *,
    *:before,
    *:after{
      animation:none !important;
      transition-duration:.01ms !important;
      scroll-behavior:auto !important;
    }
  }
</style>
</head>

<body>

<main class="app" id="app">

  <div class="ambient" id="ambient">
    <div class="veil"></div>
    <div class="orb a"></div>
    <div class="orb b"></div>
  </div>

  <div class="presence" id="presence"></div>
  <div class="grain"></div>

  <header>
    <div class="brand">

      <svg
        class="flameMark"
        viewBox="0 0 48 64"
        fill="none"
        aria-hidden="true"
      >
        <path
          d="M24 3C23 17 9 21 9 39c0 12 7 21 15 22 8-1 15-10 15-22C39 21 25 17 24 3Z"
          stroke="currentColor"
          stroke-width="1.4"
        />

        <path
          d="M24 18c-1 9-8 12-8 22 0 7 4 13 8 14 4-1 8-7 8-14 0-10-7-13-8-22Z"
          stroke="currentColor"
          stroke-width="1.1"
          opacity=".62"
        />
      </svg>

      <span>HESTIA</span>
    </div>

    <span class="micro">
      LIVING TONE SANCTUARY · V3
    </span>
  </header>

  <section class="intro" id="intro">

    <div class="introInner">

      <div class="kicker">
        A QUIET SPACE THAT RESPONDS
      </div>

      <h1>
        Awaken<br>
        Your Flame.
      </h1>

      <p>
        不需要立即做出選擇。<br>
        先讓空間感覺到你的存在。
      </p>

      <div class="awakenWrap">

        <button
          class="awaken"
          id="awaken"
          aria-label="長按喚醒 HESTIA"
        >

          <svg
            class="holdFlame"
            viewBox="0 0 48 64"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M24 3C23 17 9 21 9 39c0 12 7 21 15 22 8-1 15-10 15-22C39 21 25 17 24 3Z"
              stroke="currentColor"
              stroke-width="1.3"
            />

            <path
              d="M24 18c-1 9-8 12-8 22 0 7 4 13 8 14 4-1 8-7 8-14 0-10-7-13-8-22Z"
              stroke="currentColor"
              stroke-width="1.1"
              opacity=".62"
            />
          </svg>

        </button>

        <svg
          class="progressRing"
          viewBox="0 0 152 152"
          aria-hidden="true"
        >
          <circle
            class="progressTrack"
            cx="76"
            cy="76"
            r="70"
          ></circle>

          <circle
            class="progressValue"
            id="entryProgress"
            cx="76"
            cy="76"
            r="70"
          ></circle>
        </svg>

        <div
          class="holdLabel"
          id="holdLabel"
        >
          PRESS & HOLD TO AWAKEN
        </div>

      </div>

      <button
        class="quickEnter"
        id="quickEnter"
      >
        PREVIEW WITHOUT HOLDING
      </button>

    </div>
  </section>

  <section
    class="experience"
    id="experience"
  >

    <div
      class="index"
      id="index"
    ></div>

    <div
      class="scroller"
      id="scroller"
    ></div>

    <div class="scrollHint">
      MOVE SLOWLY · LET THE TONES BLEND
    </div>

  </section>

  <section
    class="result"
    id="result"
    role="dialog"
    aria-modal="true"
  >

    <div class="resultCard">

      <div class="resultLabel">
        YOUR TONE HAS BEEN RECEIVED
      </div>

      <h2 id="resultTitle">
        EMBER VEIL
      </h2>

      <p id="resultDesc"></p>

      <div class="received">
        這是互動體驗原型，選擇只會暫存在目前裝置，尚未連接正式票數資料庫。
      </div>

      <button
        class="closeResult"
        id="closeResult"
      >
        RETURN TO THE SANCTUARY
      </button>

    </div>
  </section>

  <noscript>
    <div class="jsNote">
      此版本需要 JavaScript 才能體驗長按與觸碰回應。請用 Safari 或其他瀏覽器開啟。
    </div>
  </noscript>

</main>

<script>
(() => {

  const tones = [
    {
      name:"EMBER VEIL",
      desc:"Quiet intensity, held within.",
      zh:"安靜而集中，像未曾熄滅的內在熱度。",
      colors:[
        "#4b1119",
        "#7e2530",
        "#b46563",
        "#d4a59b"
      ],
      a:"#a94a50",
      b:"#6d1823",
      c:"#1c090d"
    },

    {
      name:"ROSE SMOKE",
      desc:"Soft presence. Clear intention.",
      zh:"柔和不等於退讓，溫度與意志可以同時存在。",
      colors:[
        "#4c2930",
        "#7c4e57",
        "#ae7a80",
        "#d9b3b4"
      ],
      a:"#a96f79",
      b:"#6f414a",
      c:"#1a1013"
    },

    {
      name:"MIDNIGHT CURRENT",
      desc:"Still on the surface. Alive underneath.",
      zh:"表面沉靜，底層卻持續流動。",
      colors:[
        "#101a2b",
        "#223654",
        "#405f85",
        "#7994b2"
      ],
      a:"#496d96",
      b:"#203c62",
      c:"#070c15"
    },

    {
      name:"MINERAL SAGE",
      desc:"Grounded, measured, quietly expansive.",
      zh:"穩定、克制，卻保有向外延伸的空間。",
      colors:[
        "#26312d",
        "#45584f",
        "#71877a",
        "#a7b5aa"
      ],
      a:"#6f8a7d",
      b:"#3d564b",
      c:"#0d1310"
    }
  ];

  const app =
    document.getElementById("app");

  const intro =
    document.getElementById("intro");

  const experience =
    document.getElementById("experience");

  const scroller =
    document.getElementById("scroller");

  const index =
    document.getElementById("index");

  const presence =
    document.getElementById("presence");

  const awaken =
    document.getElementById("awaken");

  const entryProgress =
    document.getElementById("entryProgress");

  const holdLabel =
    document.getElementById("holdLabel");

  const quickEnter =
    document.getElementById("quickEnter");

  const result =
    document.getElementById("result");

  const resultTitle =
    document.getElementById("resultTitle");

  const resultDesc =
    document.getElementById("resultDesc");

  const closeResult =
    document.getElementById("closeResult");


  let entryRAF = 0;
  let entryStart = 0;
  let entryHolding = false;

  const entryDuration = 1450;

  let activeIndex = 0;
  let settleTimer = 0;


  function hexToRgb(hex){

    const n =
      parseInt(
        hex.slice(1),
        16
      );

    return {
      r:(n >> 16) & 255,
      g:(n >> 8) & 255,
      b:n & 255
    };
  }


  function mixHex(a,b,t){

    const A = hexToRgb(a);
    const B = hexToRgb(b);

    const color = ["r","g","b"].map(key => {
      return Math.round(
        A[key] +
        (B[key] - A[key]) * t
      );
    });

    return "#" +
      color
        .map(value => {
          return value
            .toString(16)
            .padStart(2,"0");
        })
        .join("");
  }


  function setAmbient(a,b,c){

    app.style.setProperty("--a",a);
    app.style.setProperty("--b",b);
    app.style.setProperty("--c",c);
  }


  function vibrate(pattern){

    if(navigator.vibrate){
      navigator.vibrate(pattern);
    }
  }


  tones.forEach((tone,indexNumber) => {

    const dot =
      document.createElement("span");

    if(indexNumber === 0){
      dot.classList.add("active");
    }

    index.appendChild(dot);


    const section =
      document.createElement("section");

    section.className = "tone";

    section.dataset.index =
      indexNumber;


    section.innerHTML = `
      <div class="toneInner">

        <div>

          <div class="eyebrow">
            0${indexNumber + 1} / 0${tones.length}
          </div>

          <h2 class="toneName">
            ${tone.name}
          </h2>

        </div>

        <div class="meta">

          <div class="desc">
            ${tone.desc}
            <br>
            <span style="opacity:.74">
              ${tone.zh}
            </span>
          </div>

          <div class="swatches">

            ${tone.colors
              .map(color => {
                return `
                  <span
                    class="swatch"
                    style="background:${color}"
                  ></span>
                `;
              })
              .join("")}

          </div>

          <div class="claimWrap">

            <button
              class="claim"
              aria-label="長按選擇 ${tone.name}"
              data-index="${indexNumber}"
            >

              <svg
                viewBox="0 0 48 64"
                fill="none"
                aria-hidden="true"
              >

                <path
                  d="M24 3C23 17 9 21 9 39c0 12 7 21 15 22 8-1 15-10 15-22C39 21 25 17 24 3Z"
                  stroke="currentColor"
                  stroke-width="1.4"
                />

                <path
                  d="M24 18c-1 9-8 12-8 22 0 7 4 13 8 14 4-1 8-7 8-14 0-10-7-13-8-22Z"
                  stroke="currentColor"
                  stroke-width="1.1"
                  opacity=".62"
                />

              </svg>

            </button>

            <div class="claimText">
              PRESS & HOLD
              <br>
              TO CLAIM THIS TONE
            </div>

          </div>

        </div>

      </div>
    `;

    scroller.appendChild(section);
  });


  const toneSections = [
    ...document.querySelectorAll(".tone")
  ];

  const dots = [
    ...document.querySelectorAll(".index span")
  ];


  function enterExperience(){

    if(
      experience.classList.contains("visible")
    ){
      return;
    }

    intro.classList.add("hidden");

    experience.classList.add("visible");

    setTimeout(() => {

      toneSections[0]
        .classList
        .add("settled");

    },850);

    vibrate(18);
  }


  function resetEntry(){

    entryHolding = false;

    awaken
      .classList
      .remove("holding");

    cancelAnimationFrame(entryRAF);

    entryProgress.style.strokeDashoffset =
      439.82;

    holdLabel.textContent =
      "PRESS & HOLD TO AWAKEN";
  }


  function entryTick(now){

    if(!entryHolding){
      return;
    }

    const progress =
      Math.min(
        1,
        (now - entryStart) /
        entryDuration
      );

    entryProgress.style.strokeDashoffset =
      439.82 * (1 - progress);

    holdLabel.textContent =
      progress < .98
      ? "KEEP HOLDING"
      : "AWAKENING";

    if(progress >= 1){

      resetEntry();

      enterExperience();

      return;
    }

    entryRAF =
      requestAnimationFrame(entryTick);
  }


  awaken.addEventListener(
    "pointerdown",
    event => {

      event.preventDefault();

      entryHolding = true;

      entryStart =
        performance.now();

      awaken
        .classList
        .add("holding");

      vibrate(8);

      entryRAF =
        requestAnimationFrame(entryTick);
    }
  );


  [
    "pointerup",
    "pointercancel",
    "pointerleave"
  ].forEach(eventName => {

    awaken.addEventListener(
      eventName,
      resetEntry
    );

  });


  quickEnter.addEventListener(
    "click",
    enterExperience
  );


  function updateOnScroll(){

    const height =
      scroller.clientHeight ||
      window.innerHeight;

    const rawPosition =
      scroller.scrollTop /
      height;

    const currentIndex =
      Math.max(
        0,
        Math.min(
          tones.length - 1,
          Math.floor(rawPosition)
        )
      );

    const nextIndex =
      Math.min(
        tones.length - 1,
        currentIndex + 1
      );

    const transitionProgress =
      Math.max(
        0,
        Math.min(
          1,
          rawPosition - currentIndex
        )
      );


    setAmbient(

      mixHex(
        tones[currentIndex].a,
        tones[nextIndex].a,
        transitionProgress
      ),

      mixHex(
        tones[currentIndex].b,
        tones[nextIndex].b,
        transitionProgress
      ),

      mixHex(
        tones[currentIndex].c,
        tones[nextIndex].c,
        transitionProgress
      )
    );


    const nearestIndex =
      Math.max(
        0,
        Math.min(
          tones.length - 1,
          Math.round(rawPosition)
        )
      );


    if(nearestIndex !== activeIndex){

      activeIndex =
        nearestIndex;

      dots.forEach(
        (dot,dotIndex) => {

          dot.classList.toggle(
            "active",
            dotIndex === activeIndex
          );

        }
      );


      toneSections.forEach(section => {
        section
          .classList
          .remove("settled");
      });

      vibrate(5);
    }


    clearTimeout(settleTimer);


    settleTimer =
      setTimeout(() => {

        toneSections.forEach(
          (section,sectionIndex) => {

            section.classList.toggle(
              "settled",
              sectionIndex === activeIndex
            );

          }
        );

      },700);
  }


  scroller.addEventListener(
    "scroll",
    updateOnScroll,
    {
      passive:true
    }
  );


  function movePresence(x,y){

    app.style.setProperty(
      "--px",
      `${x}px`
    );

    app.style.setProperty(
      "--py",
      `${y}px`
    );

    presence.style.left =
      `${x}px`;

    presence.style.top =
      `${y}px`;

    presence.style.opacity =
      ".9";
  }


  app.addEventListener(
    "pointermove",
    event => {

      movePresence(
        event.clientX,
        event.clientY
      );

    },
    {
      passive:true
    }
  );


  app.addEventListener(
    "pointerdown",
    event => {

      movePresence(
        event.clientX,
        event.clientY
      );

    },
    {
      passive:true
    }
  );


  app.addEventListener(
    "pointerup",
    () => {

      presence.style.opacity =
        ".25";

    },
    {
      passive:true
    }
  );


  app.addEventListener(
    "pointerleave",
    () => {

      presence.style.opacity =
        "0";

    },
    {
      passive:true
    }
  );


  document
    .querySelectorAll(".claim")
    .forEach(button => {

      let claimRAF = 0;
      let claimStart = 0;
      let claimHolding = false;

      const claimDuration = 1450;


      const resetClaim = () => {

        claimHolding = false;

        cancelAnimationFrame(claimRAF);

        button.style.setProperty(
          "--claim",
          "0%"
        );
      };


      const claimTick = now => {

        if(!claimHolding){
          return;
        }


        const progress =
          Math.min(
            1,
            (now - claimStart) /
            claimDuration
          );


        button.style.setProperty(
          "--claim",
          `${progress * 100}%`
        );


        if(progress >= 1){

          const toneIndex =
            Number(
              button.dataset.index
            );


          localStorage.setItem(
            "hestiaLivingTone",
            JSON.stringify({
              tone:
                tones[toneIndex].name,

              selectedAt:
                new Date().toISOString()
            })
          );


          resultTitle.textContent =
            tones[toneIndex].name;


          resultDesc.innerHTML = `
            ${tones[toneIndex].desc}
            <br>
            ${tones[toneIndex].zh}
          `;


          result
            .classList
            .add("open");


          vibrate([
            18,
            45,
            24
          ]);


          resetClaim();

          return;
        }


        claimRAF =
          requestAnimationFrame(
            claimTick
          );
      };


      button.addEventListener(
        "pointerdown",
        event => {

          event.preventDefault();

          claimHolding = true;

          claimStart =
            performance.now();

          vibrate(6);

          claimRAF =
            requestAnimationFrame(
              claimTick
            );
        }
      );


      [
        "pointerup",
        "pointercancel",
        "pointerleave"
      ].forEach(eventName => {

        button.addEventListener(
          eventName,
          resetClaim
        );

      });

    });


  closeResult.addEventListener(
    "click",
    () => {

      result
        .classList
        .remove("open");

    }
  );


  result.addEventListener(
    "click",
    event => {

      if(event.target === result){

        result
          .classList
          .remove("open");
      }

    }
  );


  setAmbient(
    tones[0].a,
    tones[0].b,
    tones[0].c
  );

})();
</script>

</body>
</html>
